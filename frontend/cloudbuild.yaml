steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_API_URL'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/arlo/frontend'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/arlo/frontend'
substitutions:
  _API_URL: 'https://arlo-backend-753925254002.us-central1.run.app'
